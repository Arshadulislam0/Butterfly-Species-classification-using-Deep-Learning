<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Butterfly AI Classifier</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

    <div class="main-container">

        <div class="glass-card">

            <h1 class="title">
                🦋 Butterfly AI Classifier
            </h1>

            <p class="subtitle">
                Upload a butterfly image and let AI identify its species.
            </p>

            <form action="/predict" method="POST" enctype="multipart/form-data">

                <label class="upload-box">

                    <input type="file" id="image" name="image" accept="image/*" onchange="previewImage(event)" required>

                    <i class="bi bi-cloud-arrow-up-fill upload-icon"></i>

                    <h3>Choose Butterfly Image</h3>

                    <p>
                        Click here to browse your image
                    </p>

                </label>

                <img id="preview" class="preview-image" style="display:none;">

                <button type="submit" class="predict-btn">

                    <i class="bi bi-stars"></i>

                    Predict Butterfly

                </button>

            </form>

            <div class="footer">

                <hr>

                <p>
                    Developed by <strong>Arshad</strong>
                </p>

            </div>

        </div>

    </div>

    <script>

        function previewImage(event) {

            let preview = document.getElementById("preview");

            preview.src = URL.createObjectURL(event.target.files[0]);

            preview.style.display = "block";

        }

    </script>

</body>

</html>
