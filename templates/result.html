<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Result</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #4e54c8, #8f94fb);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card-box {
            width: 90%;
            max-width: 700px;
            background: rgba(255, 255, 255, .12);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            padding: 35px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, .3);
            color: white;
        }

        h1 {
            font-weight: bold;
        }

        .subtitle {
            color: #eee;
            margin-bottom: 25px;
        }

        .result-image {
            width: 280px;
            height: 280px;
            object-fit: cover;
            border-radius: 20px;
            border: 5px solid white;
            box-shadow: 0 10px 25px rgba(0, 0, 0, .35);
            transition: .4s;
        }

        .result-image:hover {
            transform: scale(1.05);
        }

        .species-card {
            margin-top: 30px;
            background: white;
            color: #333;
            padding: 20px;
            border-radius: 18px;
        }

        .species-name {
            color: #4e54c8;
            font-size: 32px;
            font-weight: bold;
        }

        .progress {
            height: 28px;
            border-radius: 30px;
            overflow: hidden;
            margin-top: 20px;
        }

        .progress-bar {
            font-size: 15px;
            font-weight: bold;
        }

        .status {
            margin-top: 20px;
        }

        .btn-home {
            margin-top: 35px;
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            border: none;
            color: white;
            padding: 12px 35px;
            border-radius: 30px;
            font-size: 18px;
            transition: .3s;
        }

        .btn-home:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, .3);
        }

        .footer {
            margin-top: 30px;
            color: #ddd;
            font-size: 14px;
        }
    </style>

</head>

<body>

    <div class="card-box">

        <h1>🦋 Butterfly Prediction</h1>
        <p class="subtitle">
            Deep Learning Butterfly Species Recognition
        </p>

        <img src="{{ url_for('static', filename='uploads/' + image) }}" class="result-image">

        <div class="species-card">

            <h5>Predicted Species</h5>

            <div class="species-name">
                {{ species }}
            </div>

            <hr>

            <h5>Confidence Score</h5>

            <div class="progress">

                <div class="progress-bar bg-success progress-bar-striped progress-bar-animated"
                    style="width: {{ confidence }}%;">
                    {{ confidence }}%
                </div>

            </div>

            <div class="status">

                {% if confidence >= 90 %}
                <span class="badge bg-success fs-6">
                    ✅ Excellent Match
                </span>

                {% elif confidence >= 75 %}
                <span class="badge bg-warning text-dark fs-6">
                    👍 Good Match
                </span>

                {% else %}
                <span class="badge bg-danger fs-6">
                    ⚠ Low Confidence
                </span>
                {% endif %}

            </div>

        </div>

        <a href="{{ url_for('home') }}">

            <button class="btn-home">

                <i class="bi bi-arrow-repeat"></i>

                Predict Another Butterfly

            </button>

        </a>

        <div class="footer">
            <hr>
            Developed by <strong>Arshadul_Islam</strong>
        </div>

    </div>

</body>

</html>
